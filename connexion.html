2 stroke-width=%221.9%22 stroke-linecap=%22round%22/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--orange:#FF5A1F;--orange-deep:#EA4A10;--orange-soft:#FFF1EA;--ink:#171A20;--ink2:#3D434E;--muted:#6C7285;--line:#EBECF1;--bg:#F4F5F8;--green:#0E8A68;--green-bg:#DFF3ED;--red:#D63B33;--red-bg:#FCECEA;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:20px;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(900px 500px at 80% -10%, rgba(255,90,31,.16), transparent 60%)}
.box{position:relative;background:#fff;border-radius:22px;width:100%;max-width:400px;padding:32px 30px calc(30px + var(--safe-b));box-shadow:0 30px 80px -20px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:22px}
.logo .lg{width:40px;height:40px;border-radius:50%;background:#0A0B0E;border:1.5px solid #262A32;display:grid;place-items:center}
.logo .lg svg{width:22px;height:22px}
.logo b{font-family:'Sora';font-size:1.2rem}
.logo b em{font-style:normal;color:var(--orange)}
h1{font-family:'Sora';font-size:1.25rem;letter-spacing:-.3px;margin-bottom:5px}
.sub{font-size:.83rem;color:var(--muted);margin-bottom:20px;line-height:1.6}
label{display:block;font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:13px 0 6px}
input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink)}
input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,90,31,.11)}
.go{width:100%;margin-top:19px;background:var(--orange);color:#fff;font-weight:800;font-size:.93rem;padding:14px;border-radius:13px;border:0;cursor:pointer;font-family:inherit;transition:.15s}
.go:hover{background:var(--orange-deep)}
.go:disabled{background:#D8DAE1;cursor:wait}
.alt{width:100%;margin-top:10px;background:none;border:0;font-size:.8rem;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;padding:9px}
.alt:hover{color:var(--orange-deep)}
.msg{margin-top:14px;border-radius:12px;padding:12px 14px;font-size:.8rem;line-height:1.6;display:none}
.msg.err{display:block;background:var(--red-bg);color:var(--red)}
.msg.ok{display:block;background:var(--green-bg);color:#0A6B51}
.foot{margin-top:18px;text-align:center;font-size:.7rem;color:var(--muted)}
button:focus-visible,input:focus-visible{outline:2px solid var(--orange);outline-offset:2px}

/* ===== polissage UX transversal ===== */
/* 1. focus clavier visible : accessibilité + navigation Tab */
:focus-visible{outline:2.5px solid var(--orange,#FF5A1F);outline-offset:2px;border-radius:6px}
button:focus:not(:focus-visible), a:focus:not(:focus-visible){outline:none}
/* 2. retour tactile universel : tout ce qui se presse se comprime */
button:active, .chip:active, .fchip:active, .skchip:active, .rchip:active, .bcat:active,
a.btn:active, .btn:active, .qbig:active, .qsec:active, .dbig:active, .addline:active{transform:scale(.97)}
/* 3. les lignes cliquables se déclarent : curseur + fond au survol */
tbody tr[onclick]{cursor:pointer;transition:background .12s}
tbody tr[onclick]:hover{background:#FAFAFC}
tbody tr[onclick]:hover td:first-child{box-shadow:inset 3px 0 0 var(--orange,#FF5A1F)}
/* 4. les chiffres s'alignent en colonnes (tableaux, montants, KPI) */
td, .amt, .num, .qamt, .kpi, .dte{font-variant-numeric:tabular-nums}
/* 5. pas de surlignage accidentel sur l'interactif */
button, .chip, .fchip, .skchip, .rchip, .seg, .bnv, .bcat, .st{-webkit-user-select:none;user-select:none}
/* sélection de texte aux couleurs de la maison */
::selection{background:#FFD9C4;color:#171A20}
/* 6. barres de défilement fines et discrètes partout */
*{scrollbar-width:thin;scrollbar-color:#D8DAE1 transparent}
*::-webkit-scrollbar{width:6px;height:6px}
*::-webkit-scrollbar-thumb{background:#D8DAE1;border-radius:5px}
*::-webkit-scrollbar-thumb:hover{background:#C2C6CE}
*::-webkit-scrollbar-track{background:transparent}
/* respect du mode « réduire les animations » du système */
@media(prefers-reduced-motion:reduce){
  *, *::before, *::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ===== anti-saut entre les pages : la gouttière de défilement est réservée ===== */
html{overflow-y:scroll;scrollbar-gutter:stable}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <span class="lg" style="position:relative;overflow:hidden"><img src="logo-tigre.png" alt="" style="position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="if(!this.dataset.f){this.dataset.f=1;this.src='logotigre.png'}else{this.remove()}"><svg viewBox="0 0 24 24" fill="none" stroke="#FF5A1F" stroke-width="2.2" stroke-linecap="round"><g stroke-width="1.7"><path d="M7.4 6.5 L5.4 3.6 C7 2.9 8.4 2.8 9.6 3.4"/><path d="M16.6 6.5 L18.6 3.6 C17 2.9 15.6 2.8 14.4 3.4"/><path d="M12 21.2 C9.1 21.2 6.5 19.4 5.7 16.6 C5.1 14.4 5.2 11.9 6 9.8 C6.5 8.4 7.5 7.1 8.9 6.3 C9.9 5.8 10.9 5.5 12 5.5 C13.1 5.5 14.1 5.8 15.1 6.3 C16.5 7.1 17.5 8.4 18 9.8 C18.8 11.9 18.9 14.4 18.3 16.6 C17.5 19.4 14.9 21.2 12 21.2 Z"/><path d="M12 5.7 V8.1"/><path d="M10.1 6.2 L10.5 8.2"/><path d="M13.9 6.2 L13.5 8.2"/><path d="M8.1 11.1 L10.2 11.9"/><path d="M15.9 11.1 L13.8 11.9"/><path d="M5.8 12.6 L7.5 12.9"/><path d="M6 14.7 L7.6 14.6"/><path d="M18.2 12.6 L16.5 12.9"/><path d="M18 14.7 L16.4 14.6"/><path d="M10.8 14.5 H13.2 L12 15.9 Z"/><path d="M12 15.9 V17.3"/><path d="M12 17.3 C11 17.4 10.1 17 9.5 16.3"/><path d="M12 17.3 C13 17.4 13.9 17 14.5 16.3"/></g></svg></span>
    <b>TIGER<em>FLOW</em></b>
  </div>

  <h1 id="ttl">Connexion</h1>
  <p class="sub" id="sub">L'espace de gestion de Tiger Hygiène 3D. Réservé à l'équipe.</p>

  <label>Email</label>
  <input type="email" id="email" autocomplete="email" placeholder="prenom@tiger-hygiene3d.fr">
  <label>Mot de passe</label>
  <input type="password" id="pass" autocomplete="current-password" placeholder="••••••••">

  <button class="go" id="go" onclick="submit()">Se connecter</button>
  <button class="alt" id="alt" onclick="toggleMode()">Première fois ? Créer le compte de l'entreprise</button>
  <div class="msg" id="msg"></div>
  <p class="foot">🔒 Connexion sécurisée — vos données sont hébergées en Europe</p>
</div>

<script>
const SB = supabase.createClient(
  "https://puyffykimfougdpqkxbu.supabase.co",
  "sb_publishable_tYmlBZZSCKW2R02FlZbY6w_PQD5xROa"
);
let MODE = "login";

/* déjà connecté ? direction le tableau de bord */
SB.auth.getSession().then(({data}) => {
  if(data && data.session) location.href = "dashboard.html";
});

function toggleMode(){
  MODE = MODE === "login" ? "signup" : "login";
  document.getElementById("ttl").textContent = MODE === "login" ? "Connexion" : "Créer le compte";
  document.getElementById("sub").textContent = MODE === "login"
    ? "L'espace de gestion de Tiger Hygiène 3D. Réservé à l'équipe."
    : "Choisissez l'email et le mot de passe du compte administrateur (8 caractères minimum).";
  document.getElementById("go").textContent = MODE === "login" ? "Se connecter" : "Créer mon compte";
  document.getElementById("alt").textContent = MODE === "login" ? "Première fois ? Créer le compte de l'entreprise" : "← J'ai déjà un compte, me connecter";
  say("", "");
}
function say(txt, cls){
  const m = document.getElementById("msg");
  m.textContent = txt;
  m.className = "msg" + (cls ? " " + cls : "");
}
async function submit(){
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value;
  if(!email || !pass){ say("Email et mot de passe sont nécessaires.", "err"); return; }
  const b = document.getElementById("go");
  b.disabled = true; b.textContent = "Un instant…";
  try{
    if(MODE === "signup"){
      const {error} = await SB.auth.signUp({email, password: pass});
      if(error) throw error;
      say("✅ Compte créé ! Si Supabase demande une confirmation, vérifie ta boîte mail — sinon connecte-toi directement.", "ok");
      MODE = "login"; toggleMode(); toggleMode();  /* rafraîchit les libellés en mode login */
    } else {
      const {error} = await SB.auth.signInWithPassword({email, password: pass});
      if(error) throw error;
      say("✅ Connecté ! Direction le tableau de bord…", "ok");
      setTimeout(()=> location.href = "dashboard.html", 600);
    }
  }catch(e){
    const t = (e && e.message) || "";
    if(/invalid login/i.test(t)) say("Email ou mot de passe incorrect.", "err");
    else if(/already registered/i.test(t)) say("Ce compte existe déjà — connecte-toi.", "err");
    else if(/at least/i.test(t) || /password/i.test(t)) say("Mot de passe trop court : 8 caractères minimum.", "err");
    else if(/confirm/i.test(t)) say("Compte non confirmé : clique le lien reçu par email (ou désactive la confirmation dans Supabase → Authentication).", "err");
    else say("Connexion impossible : " + t, "err");
  }
  b.disabled = false;
  b.textContent = MODE === "login" ? "Se connecter" : "Créer mon compte";
}
document.addEventListener("keydown", e => { if(e.key === "Enter") submit(); });
</script>
</body>
</html>
